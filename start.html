<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophische Denkschulen – Abhängigkeitsgraph</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --text: #e8e2d6;
    --muted: #6b6560;
    --font-display: 'Cormorant Garamond', serif;
    --font-ui: 'Josefin Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 3rem 2rem 1.5rem;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #b8a882, transparent);
    margin: 1.2rem auto 0;
  }
  .eyebrow {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: #f0e8d6;
    line-height: 1.2;
  }
  .subtitle {
    font-family: var(--font-display);
    font-size: 1rem;
    font-style: italic;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* ── Legend ── */
  #legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    padding: 1rem 2rem 0.5rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-ui);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .legend-line {
    width: 32px; height: 2px;
    border-radius: 1px;
  }
  .legend-line.influences { background: #b8a882; }
  .legend-line.continues  { background: #6a9f8a; }
  .legend-line.criticizes { background: #c46b5a; }
  .legend-line.synthesizes{ background: #7a8fc4; }
  .legend-line.dashed {
    background: none;
    border-top: 2px dashed #6a9f8a;
  }

  /* ── Graph container ── */
  #graph-wrap {
    width: 100%;
    overflow-x: auto;
    padding: 1rem 0 2rem;
  }
  svg { display: block; }

  /* ── SVG elements ── */
  .swim-lane-bg { opacity: 1; }
  .swim-label {
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    fill-opacity: 0.35;
  }
  .era-divider { stroke-dasharray: 4 6; }

  .node-group { cursor: pointer; }
  .node-rect {
    rx: 4; ry: 4;
    stroke-width: 1.5;
    transition: filter 0.2s;
  }
  .node-group:hover .node-rect { filter: brightness(1.4); }
  .node-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 12px;
    fill: #f0e8d6;
    pointer-events: none;
  }
  .node-era-tag {
    font-family: var(--font-ui);
    font-size: 8px;
    letter-spacing: 0.1em;
    fill-opacity: 0.5;
    pointer-events: none;
  }

  .edge-path {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.45;
    transition: opacity 0.2s, stroke-width 0.2s;
  }
  .edge-path.highlighted { opacity: 1; stroke-width: 2.5; }
  .edge-path.dimmed { opacity: 0.08; }

  /* ── Detail Panel ── */
  #panel {
    position: fixed;
    top: 0; right: -480px;
    width: min(480px, 100vw);
    height: 100vh;
    background: #111118;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    transition: right 0.35s cubic-bezier(0.16,1,0.3,1);
    z-index: 100;
    padding: 2rem 1.75rem 3rem;
  }
  #panel.open { right: 0; }
  #panel-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1.4rem; line-height: 1;
    font-family: var(--font-ui);
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
  }
  #panel-close:hover { color: var(--text); }
  .panel-era {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.03em;
    color: #f0e8d6;
    line-height: 1.2;
    margin-bottom: 0.2rem;
  }
  .panel-divider {
    height: 1px;
    margin: 1rem 0;
    background: linear-gradient(90deg, currentColor, transparent);
    opacity: 0.3;
  }
  .section-label {
    font-family: var(--font-ui);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .panel-core {
    font-family: var(--font-display);
    font-size: 1.1rem;
    line-height: 1.75;
    color: #c8c0b4;
    margin-bottom: 1.5rem;
  }
  .panel-detail {
    font-family: var(--font-display);
    font-size: 0.98rem;
    line-height: 1.8;
    color: #9a9088;
    margin-bottom: 1.5rem;
  }
  .reps-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }
  .rep-chip {
    font-family: var(--font-display);
    font-size: 0.85rem;
    padding: 0.2rem 0.7rem;
    border-radius: 2px;
    border: 1px solid;
    opacity: 0.75;
  }
  .connections-list { list-style: none; }
  .conn-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-display);
    font-size: 0.92rem;
    line-height: 1.5;
    color: #9a9088;
  }
  .conn-item:last-child { border-bottom: none; }
  .conn-arrow {
    flex-shrink: 0;
    font-size: 0.75rem;
    font-family: var(--font-ui);
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    margin-top: 0.1rem;
    opacity: 0.85;
  }
  .conn-arrow.influences  { background: #b8a88225; color: #b8a882; border: 1px solid #b8a88260; }
  .conn-arrow.continues   { background: #6a9f8a25; color: #6a9f8a; border: 1px solid #6a9f8a60; }
  .conn-arrow.criticizes  { background: #c46b5a25; color: #c46b5a; border: 1px solid #c46b5a60; }
  .conn-arrow.synthesizes { background: #7a8fc425; color: #7a8fc4; border: 1px solid #7a8fc460; }

  /* ── View Toggle ── */
  #view-toggle {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0.75rem 0 0;
  }
  .view-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.4rem 1.1rem;
    transition: background 0.2s, color 0.2s;
  }
  .view-btn:first-child { border-radius: 2px 0 0 2px; }
  .view-btn:last-child  { border-radius: 0 2px 2px 0; border-left: none; }
  .view-btn.active { background: rgba(184,168,130,0.12); color: #b8a882; border-color: #b8a88260; }

  /* ── Timeline ── */
  #timeline-wrap { display: none; width: 100%; overflow-x: auto; padding: 1.5rem 0 2rem; }
  #timeline-wrap.visible { display: block; }
  .tl-bar { cursor: pointer; transition: opacity 0.15s; }
  .tl-bar:hover { opacity: 0.85; }
  .tl-label {
    font-family: var(--font-display);
    font-size: 11px;
    fill: #c8c0b4;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .tl-dot { cursor: pointer; }
  .tl-dot:hover { r: 5; }
  .tl-dot-label {
    font-family: var(--font-ui);
    font-size: 9px;
    letter-spacing: 0.05em;
    fill: #6b6560;
    pointer-events: none;
  }
  .tl-axis-label {
    font-family: var(--font-ui);
    font-size: 9px;
    letter-spacing: 0.08em;
    fill: #4a4540;
  }
  .tl-era-label {
    font-family: var(--font-ui);
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    fill-opacity: 0.3;
  }

  /* ── Quiz ── */
  #quiz-section { margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
  #quiz-start-btn {
    display: block; width: 100%;
    background: none;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 2px;
    color: #9a9088;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.55rem 1rem;
    transition: border-color 0.2s, color 0.2s;
  }
  #quiz-start-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .quiz-q {
    font-family: var(--font-display);
    font-size: 1rem;
    line-height: 1.6;
    color: #c8c0b4;
    margin-bottom: 1rem;
  }
  .quiz-q-counter {
    font-family: var(--font-ui);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
  .quiz-opt {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: #9a9088;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 0.9rem;
    line-height: 1.4;
    padding: 0.55rem 0.9rem;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .quiz-opt:hover:not(:disabled) { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }
  .quiz-opt.correct { border-color: #4aaa8060; background: #4aaa8015; color: #4aaa80; }
  .quiz-opt.wrong   { border-color: #c46b5a60; background: #c46b5a15; color: #c46b5a; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback {
    font-family: var(--font-display);
    font-size: 0.88rem;
    line-height: 1.6;
    padding: 0.5rem 0.75rem;
    border-radius: 2px;
    margin-bottom: 0.75rem;
  }
  .quiz-feedback.correct { color: #4aaa80; background: #4aaa8010; border-left: 2px solid #4aaa8060; }
  .quiz-feedback.wrong   { color: #c46b5a; background: #c46b5a10; border-left: 2px solid #c46b5a60; }
  .quiz-next-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 2px; color: var(--text); cursor: pointer;
    font-family: var(--font-ui); font-size: 0.65rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.4rem 0.9rem; transition: background 0.15s;
  }
  .quiz-next-btn:hover { background: rgba(255,255,255,0.06); }
  .quiz-score {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: #b8a882;
    text-align: center;
    padding: 1rem 0 0.5rem;
  }
  .quiz-score-sub {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1rem;
  }

  /* ── Lernpfade ── */
  #path-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 2rem 0.25rem;
  }
  .path-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.35rem 0.85rem;
    transition: border-color 0.2s, color 0.2s;
  }
  .path-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .path-btn.active { color: #b8a882; border-color: #b8a882; }

  #path-stepper {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.6rem 2rem;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }
  #path-stepper.visible { display: flex; }
  .path-nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.8rem;
    transition: background 0.2s;
  }
  .path-nav-btn:hover { background: rgba(255,255,255,0.06); }
  .path-nav-btn:disabled { opacity: 0.25; cursor: default; }
  #path-exit-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.7rem;
    padding: 0.2rem 0.4rem;
    transition: color 0.2s;
  }
  #path-exit-btn:hover { color: var(--text); }

  .node-group.path-member .node-rect { stroke-opacity: 1 !important; stroke-width: 2 !important; }
  .node-group.path-current .node-rect { filter: brightness(1.8) !important; stroke-width: 3 !important; }
  .node-group.path-dim { opacity: 0.1; }

  #path-transition-banner {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-style: italic;
    line-height: 1.7;
    color: #7a8fc4;
    border-left: 2px solid #7a8fc440;
    padding: 0.5rem 0 0.5rem 1rem;
    margin-bottom: 1.25rem;
  }

  /* ── Legend toggle (mobile) ── */
  #legend-toggle {
    display: none;
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.6rem 0;
    transition: color 0.2s;
  }
  #legend-toggle:hover { color: var(--text); }

  @media (max-width: 640px) {
    #legend-toggle { display: block; }
    #legend { display: none; padding-bottom: 0.75rem; }
    #legend.open { display: flex; }

    #graph-wrap {
      overflow: hidden;
      height: 55vh;
      padding: 0;
    }
    #graph-wrap svg {
      width: 100% !important;
      height: 100%;
    }

    #panel {
      top: auto;
      bottom: -82vh;
      right: 0;
      width: 100vw;
      height: 82vh;
      border-left: none;
      border-top: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      transition: bottom 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    #panel.open { bottom: 0; right: 0; }
  }

  /* ── Search ── */
  #search-wrap {
    display: flex;
    justify-content: center;
    padding: 0.75rem 2rem 0;
  }
  #search-input {
    background: #1a1a24;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 0.5rem 1rem;
    width: min(340px, 100%);
    outline: none;
    transition: border-color 0.2s;
  }
  #search-input::placeholder { color: var(--muted); }
  #search-input:focus { border-color: #b8a88260; }
  .node-group.search-match .node-rect { filter: brightness(1.6); }
  .node-group.search-dim { opacity: 0.12; }

  /* ── Progress ── */
  #progress-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.6rem 2rem 0;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  #progress-bar-track {
    width: 120px; height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: #b8a882;
    border-radius: 1px;
    transition: width 0.4s;
    width: 0%;
  }
  #progress-reset {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-family: var(--font-ui);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.4rem;
    transition: color 0.2s;
  }
  #progress-reset:hover { color: var(--text); }
  .node-group.visited .node-rect { filter: brightness(1.5) !important; }
  .node-visited-mark { font-size: 9px; fill: #b8a882; fill-opacity: 0; pointer-events: none; }
  .node-group.visited .node-visited-mark { fill-opacity: 0.9; }
  #panel-fav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1.2rem; padding: 0.2rem; line-height: 1;
    color: var(--muted); transition: color 0.2s, transform 0.15s;
  }
  #panel-fav-btn:hover { transform: scale(1.2); }
  #panel-fav-btn.active { color: #b8a882; }
  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #1a1a24;
    border: 1px solid var(--border);
    padding: 0.5rem 0.9rem;
    font-family: var(--font-display);
    font-size: 0.85rem;
    color: var(--muted);
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    max-width: 220px;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Ideengeschichte · Westliche Philosophie</p>
  <h1>Philosophische Denkschulen</h1>
  <p class="subtitle">Abhängigkeiten, Einflüsse und Brüche von der Antike bis zur Gegenwart</p>
  <div id="progress-wrap">
    <span id="progress-text">0 / 22 erkundet</span>
    <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
    <button id="progress-reset">Zurücksetzen</button>
  </div>
</header>

<div id="view-toggle">
  <button class="view-btn active" id="btn-graph">Graph</button>
  <button class="view-btn" id="btn-timeline">Zeitleiste</button>
</div>
<button id="legend-toggle" aria-controls="legend" aria-expanded="false">Legende ▾</button>
<div id="search-wrap">
  <input id="search-input" type="search" placeholder="Denkschule oder Philosoph suchen …" autocomplete="off">
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-line influences"></div> Beeinflusst</div>
  <div class="legend-item"><div class="legend-line continues dashed"></div> Setzt fort</div>
  <div class="legend-item"><div class="legend-line criticizes"></div> Kritisiert / Bricht mit</div>
  <div class="legend-item"><div class="legend-line synthesizes"></div> Synthetisiert</div>
</div>

<div id="path-bar"></div>
<div id="path-stepper">
  <button class="path-nav-btn" id="path-prev-btn">← Zurück</button>
  <span id="path-counter"></span>
  <button class="path-nav-btn" id="path-next-btn">Weiter →</button>
  <button id="path-exit-btn" type="button" title="Pfad beenden" aria-label="Lernpfad beenden">✕</button>
</div>

<div id="graph-wrap"><svg id="main-svg"></svg></div>
<div id="timeline-wrap"><svg id="timeline-svg"></svg></div>
<div id="panel">
  <button id="panel-close">✕</button>
  <div id="panel-content"></div>
</div>
<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════
// LERNPFADE
// ═══════════════════════════════════════════════════
const PATHS = [
  { id: "klassisch", title: "Der klassische Weg",
    desc: "Von den Ursprüngen der Philosophie bis zum deutschen Idealismus",
    steps: [
      { id: "platonismus",    transition: null },
      { id: "aristotelismus", transition: "Aristoteles kritisiert Platons getrennte Ideenwelt: Die Form ist in den Dingen selbst, nicht jenseits von ihnen." },
      { id: "scholastik",     transition: "Thomas von Aquin synthetisiert Aristoteles mit dem christlichen Gottesbegriff und begründet die Hochscholastik." },
      { id: "rationalismus",  transition: "Descartes bricht mit der Schulphilosophie und sucht durch radikalen Zweifel ein zweifelsfreies Fundament." },

// LAYOUT CONFIG
// ═══════════════════════════════════════════════════
const ERAS = ["Antike","Mittelalter","Neuzeit","19. Jahrhundert","20. Jahrhundert"];
const NODE_W = 148, NODE_H = 46, NODE_MARGIN_X = 24, LANE_H = 160, LANE_PAD_TOP = 56;
const EDGE_COLORS = {
  influences:  "#b8a882",
  continues:   "#6a9f8a",
  criticizes:  "#c46b5a",
  synthesizes: "#7a8fc4",
};

function layoutNodes() {
  const byEra = {};
  ERAS.forEach(e => byEra[e] = []);
  nodes.forEach(n => { if(byEra[n.era]) byEra[n.era].push(n); });

  let totalWidth = 0;
  ERAS.forEach(era => {
    const group = byEra[era];
    const w = group.length * (NODE_W + NODE_MARGIN_X) - NODE_MARGIN_X;
    if(w > totalWidth) totalWidth = w;
  });
  totalWidth += 160;

  const posMap = {};
  ERAS.forEach((era, i) => {
    const group = byEra[era];
    const groupW = group.length * (NODE_W + NODE_MARGIN_X) - NODE_MARGIN_X;
    const startX = (totalWidth - groupW) / 2;
    const y = i * LANE_H + LANE_PAD_TOP;
    group.forEach((n, j) => {
      posMap[n.id] = {
        x: startX + j * (NODE_W + NODE_MARGIN_X),
        y,
        w: NODE_W, h: NODE_H
      };
    });
  });

  return { posMap, totalWidth, totalHeight: ERAS.length * LANE_H + LANE_PAD_TOP + NODE_H + 40 };
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
const { posMap, totalWidth, totalHeight } = layoutNodes();

const svg = d3.select("#main-svg")
  .attr("width", totalWidth)
  .attr("height", totalHeight);

const zoomG = svg.append("g").attr("class", "zoom-layer");

// ── Zoom & Pan (mouse wheel + pinch-to-zoom) ──
const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on("zoom", event => zoomG.attr("transform", event.transform));
svg.call(zoom);

// Swim lane backgrounds
ERAS.forEach((era, i) => {
  const y = i * LANE_H;
  const color = ERA_COLORS[era];
  zoomG.append("rect")
    .attr("class","swim-lane-bg")
    .attr("x", 0).attr("y", y)
    .attr("width", totalWidth).attr("height", LANE_H)
    .attr("fill", i % 2 === 0 ? "#ffffff04" : "#00000000");

  zoomG.append("line")
    .attr("class","era-divider")
    .attr("x1", 20).attr("y1", y + LANE_H)
    .attr("x2", totalWidth - 20).attr("y2", y + LANE_H)
    .attr("stroke", color).attr("stroke-opacity", 0.15).attr("stroke-width", 1);

  zoomG.append("text")
    .attr("class","swim-label")
    .attr("x", 18).attr("y", y + 22)
    .attr("fill", color)
    .text(era.toUpperCase());
});

// ── Defs for arrowheads ──
const defs = svg.append("defs");
Object.entries(EDGE_COLORS).forEach(([type, color]) => {
  defs.append("marker")
    .attr("id", `arrow-${type}`)
    .attr("viewBox","0 -5 10 10")
    .attr("refX", 8).attr("refY", 0)
    .attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient","auto")
    .append("path")
    .attr("d","M0,-5L10,0L0,5")
    .attr("fill", color).attr("opacity", 0.8);
});

// ── Edge paths ──
const edgeGroup = zoomG.append("g").attr("class","edges");

function curvePath(s, t) {
  const p = posMap[s], q = posMap[t];
  if(!p || !q) return "";
  const x1 = p.x + p.w/2, y1 = p.y + p.h;
  const x2 = q.x + q.w/2, y2 = q.y;
  const dy = y2 - y1;
  const cp1y = y1 + dy * 0.4;
  const cp2y = y2 - dy * 0.4;
  // Slight horizontal offset to avoid direct overlap
  const dx = (x2 - x1) * 0.1;
  return `M${x1},${y1} C${x1+dx},${cp1y} ${x2-dx},${cp2y} ${x2},${y2}`;
}

const edgePaths = edgeGroup.selectAll("path")
  .data(edges.filter(e => posMap[e.s] && posMap[e.t]))
  .join("path")
  .attr("class","edge-path")
  .attr("d", e => curvePath(e.s, e.t))
  .attr("stroke", e => EDGE_COLORS[e.type])
  .attr("stroke-dasharray", e => e.type === "continues" ? "6 4" : null)
  .attr("marker-end", e => `url(#arrow-${e.type})`);

// ── Node groups ──
const tooltip = d3.select("#tooltip");
const panel = document.getElementById("panel");
const panelContent = document.getElementById("panel-content");

const nodeGroup = zoomG.append("g").attr("class","nodes");

const nodeGs = nodeGroup.selectAll("g")
  .data(nodes.filter(n => posMap[n.id]))
  .join("g")
  .attr("class","node-group")
  .attr("transform", n => `translate(${posMap[n.id].x},${posMap[n.id].y})`);

// Shadow filter
const filter = defs.append("filter").attr("id","node-shadow");
filter.append("feDropShadow")
  .attr("dx",0).attr("dy",2).attr("stdDeviation",4)
  .attr("flood-color","#000").attr("flood-opacity",0.5);

nodeGs.append("rect")
  .attr("class","node-rect")
  .attr("width", NODE_W).attr("height", NODE_H)
  .attr("fill", n => ERA_COLORS[n.era] + "22")
  .attr("stroke", n => ERA_COLORS[n.era])
  .attr("stroke-opacity", 0.6)
  .attr("filter","url(#node-shadow)");

// Era tag
nodeGs.append("text")
  .attr("class","node-era-tag")
  .attr("x", NODE_W/2).attr("y", 13)
  .attr("text-anchor","middle")
  .attr("fill", n => ERA_COLORS[n.era])
  .text(n => n.era.toUpperCase());

// Node label
nodeGs.append("text")
  .attr("class","node-name")
  .attr("x", NODE_W/2).attr("y", 31)
  .attr("text-anchor","middle")
  .text(n => n.label);

// Visited checkmark (top-right corner)
nodeGs.append("text")
  .attr("class","node-visited-mark")
  .attr("x", NODE_W - 6).attr("y", 12)
  .attr("text-anchor","end")
  .text("✓");

function updateProgress() {
  const validIds = new Set(nodes.filter(n => posMap[n.id]).map(n => n.id));
  visited = new Set([...visited].filter(id => validIds.has(id)));
  const total = validIds.size;
  if (total === 0) return;
  const count = Math.min(visited.size, total);
  document.getElementById("progress-text").textContent = `${count} / ${total} erkundet`;
  document.getElementById("progress-bar-fill").style.width = `${(count / total) * 100}%`;
  nodeGs.classed("visited", d => visited.has(d.id));
}
updateProgress();

// ── Interactions ──
nodeGs
  .on("mouseenter", function(event, d) {
    // Highlight connected edges
    edgePaths.classed("highlighted", e => e.s === d.id || e.t === d.id)
             .classed("dimmed",      e => e.s !== d.id && e.t !== d.id);
    tooltip.style("opacity",1)
      .html(`<strong>${d.label}</strong> · ${d.era}<br><span style="color:#888;font-size:0.8rem">Klicken für Details</span>`);
  })
  .on("mousemove", function(event) {
    tooltip.style("left",(event.clientX+16)+"px").style("top",(event.clientY-10)+"px");
  })
  .on("mouseleave", function() {
    if (activePath) applyPathHighlight();
    else edgePaths.classed("highlighted", false).classed("dimmed", false);
    tooltip.style("opacity",0);
  })
  .on("click", function(event, d) { showNodePanel(d); });

// ── Shared panel-open function ──
function showNodePanel(d, transitionText = null) {
  const color = ERA_COLORS[d.era];
  const outgoing = edges.filter(e => e.s === d.id && posMap[e.t]);
  const incoming = edges.filter(e => e.t === d.id && posMap[e.s]);

  const connHtml = (list, direction) => list.map(e => {
    const otherId = direction === "out" ? e.t : e.s;
    const other = nodes.find(n => n.id === otherId);
    const arrow = direction === "out"
      ? `<span class="conn-arrow ${e.type}">${{influences:"beeinflusst",continues:"setzt fort",criticizes:"kritisiert",synthesizes:"synthetisiert"}[e.type]}</span>`
      : `<span class="conn-arrow ${e.type}">${{influences:"beeinflusst durch",continues:"fortgesetzt von",criticizes:"kritisiert von",synthesizes:"synthetisiert von"}[e.type]}</span>`;
    return `<li class="conn-item">${arrow}<div><strong style="color:#d8d0c8">${other.label}</strong> <span style="color:#555;font-size:0.8em">(${other.era})</span><br>${e.label}</div></li>`;
  }).join("");

  // Mark visited
  visited.add(d.id);
  saveVisited();
  updateProgress();

  panelContent.innerHTML = `
    ${transitionText ? `<div id="path-transition-banner">${transitionText}</div>` : ""}
    <div class="panel-era" style="color:${color}">${d.era}</div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:0.5rem">
      <h2 class="panel-title">${d.label}</h2>
      <button id="panel-fav-btn" title="Lesezeichen" class="${favorites.has(d.id) ? 'active' : ''}">★</button>
    </div>
    <div class="panel-divider" style="color:${color}"></div>

    <div class="section-label">Kernthese</div>
    <p class="panel-core">${d.core}</p>

    <div class="section-label">Vertiefung</div>
    <p class="panel-detail">${d.detail}</p>

    <div class="section-label">Bedeutende Vertreter</div>
    <div class="reps-wrap">
      ${d.reps.map(r => `<span class="rep-chip" style="color:${color};border-color:${color}40;background:${color}10">${r}</span>`).join("")}
    </div>

    ${outgoing.length ? `
      <div class="section-label" style="margin-top:1.25rem">Ausgehende Verbindungen</div>
      <ul class="connections-list">${connHtml(outgoing,"out")}</ul>` : ""}

    ${incoming.length ? `
      <div class="section-label" style="margin-top:1.25rem">Eingehende Einflüsse</div>
      <ul class="connections-list">${connHtml(incoming,"in")}</ul>` : ""}

    <div id="quiz-section">
      <button id="quiz-start-btn">Quiz starten</button>
    </div>
  `;
  panel.classList.add("open");
  tooltip.style("opacity", 0);

  document.getElementById("quiz-start-btn").addEventListener("click", () => renderQuiz(d));

  // Wire up favorite toggle after innerHTML is set
  const favBtn = document.getElementById("panel-fav-btn");
  if (favBtn) favBtn.addEventListener("click", () => {
    if (favorites.has(d.id)) favorites.delete(d.id);
    else favorites.add(d.id);
    saveFavorites();
    favBtn.classList.toggle("active", favorites.has(d.id));
  });
}

document.getElementById("panel-close").addEventListener("click", () => {
  panel.classList.remove("open");
});

// ── Search ──
document.getElementById("search-input").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    nodeGs.classed("search-match", false).classed("search-dim", false);
    edgePaths.classed("dimmed", false).classed("highlighted", false);
    return;
  }
  const matchIds = new Set();
  nodes.forEach(n => {
    const hay = [n.label, n.core, ...n.reps].join(" ").toLowerCase();
    if (hay.includes(q)) matchIds.add(n.id);
  });
  nodeGs.classed("search-match", d => matchIds.has(d.id))
        .classed("search-dim",  d => !matchIds.has(d.id));
  edgePaths.classed("dimmed",      e => !matchIds.has(e.s) && !matchIds.has(e.t))
           .classed("highlighted", e =>  matchIds.has(e.s) ||  matchIds.has(e.t));
});

document.getElementById("progress-reset").addEventListener("click", () => {
  visited.clear();
  favorites.clear();
  saveVisited();
  saveFavorites();
  updateProgress();
  const favBtn = document.getElementById("panel-fav-btn");
  if (favBtn) favBtn.classList.remove("active");
});

// Click outside to close (SVG background or wrap)
document.getElementById("graph-wrap").addEventListener("click", e => {
  const tag = e.target.tagName.toLowerCase();
  if (e.target === e.currentTarget || tag === "svg" || (tag === "rect" && e.target.classList.contains("swim-lane-bg"))) {
    panel.classList.remove("open");
    edgePaths.classed("highlighted",false).classed("dimmed",false);
  }
});

  { nodeId: "kritische_theorie",  name: "Adorno",       year: 1903 },
  { nodeId: "kritische_theorie",  name: "Habermas",     year: 1929 },
  { nodeId: "poststrukturalismus",name: "Foucault",     year: 1926 },
  { nodeId: "poststrukturalismus",name: "Derrida",      year: 1930 },
];

let timelineRendered = false;

function renderTimeline() {
  if (timelineRendered) return;
  timelineRendered = true;

  const LABEL_W = 158, ROW_H = 34, PAD_TOP = 20, PAD_BOT = 50, BAR_H = 14;
  const tlNodes = nodes
    .filter(n => NODE_YEARS[n.id])
    .sort((a, b) => NODE_YEARS[a.id].start - NODE_YEARS[b.id].start);

  const svgW = Math.max(960, window.innerWidth - 40);
  const svgH = PAD_TOP + tlNodes.length * ROW_H + PAD_BOT;
  const chartW = svgW - LABEL_W - 20;

  const xMin = -650, xMax = 2050;
  const xScale = d3.scaleLinear().domain([xMin, xMax]).range([0, chartW]);

  const tlSvg = d3.select("#timeline-svg")
    .attr("width", svgW).attr("height", svgH);

  const g = tlSvg.append("g").attr("transform", `translate(${LABEL_W},${PAD_TOP})`);

  // Axis grid lines + labels
  const ticks = [-500, 0, 500, 1000, 1200, 1400, 1600, 1700, 1800, 1850, 1900, 1950, 2000];
  ticks.forEach(yr => {
    const x = xScale(yr);
    g.append("line")
      .attr("x1", x).attr("x2", x)
      .attr("y1", 0).attr("y2", tlNodes.length * ROW_H + 8)
      .attr("stroke", "#ffffff08").attr("stroke-width", 1);
    g.append("text")
      .attr("class", "tl-axis-label")
      .attr("x", x).attr("y", tlNodes.length * ROW_H + 22)
      .attr("text-anchor", "middle")
      .text(yr < 0 ? `${Math.abs(yr)} v. Chr.` : yr);
  });

  // Zero line
  g.append("line")
    .attr("x1", xScale(0)).attr("x2", xScale(0))
    .attr("y1", 0).attr("y2", tlNodes.length * ROW_H)
    .attr("stroke", "#ffffff18").attr("stroke-width", 1).attr("stroke-dasharray", "3 4");

  // Rows
  tlNodes.forEach((node, i) => {
    const yr = NODE_YEARS[node.id];
    const color = ERA_COLORS[node.era];
    const y = i * ROW_H;
    const barY = y + (ROW_H - BAR_H) / 2;
    const x1 = xScale(yr.start), x2 = xScale(yr.end);

    // Label (left)
    tlSvg.append("text")
      .attr("class", "tl-label")
      .attr("x", LABEL_W - 8).attr("y", PAD_TOP + y + ROW_H / 2)
      .attr("text-anchor", "end")
      .attr("fill", color)
      .text(node.label);

    // Bar
    const bar = g.append("rect")
      .attr("class", "tl-bar")
      .attr("x", x1).attr("y", barY)
      .attr("width", Math.max(x2 - x1, 4)).attr("height", BAR_H)
      .attr("fill", color + "40").attr("stroke", color).attr("stroke-opacity", 0.5)
      .attr("rx", 2);

    bar.on("click", () => {
      tooltip.style("opacity", 0);
      const panelNode = nodes.find(n => n.id === node.id);
      if (panelNode) openPanelForNode(panelNode);
    }).on("mouseenter", function(event) {
      tooltip.style("opacity", 1)
        .html(`<strong>${node.label}</strong><br><span style="color:#888;font-size:0.8rem">${yr.start < 0 ? Math.abs(yr.start)+" v. Chr." : yr.start} – ${yr.end < 0 ? Math.abs(yr.end)+" v. Chr." : yr.end}</span>`);
    }).on("mousemove", function(event) {
      tooltip.style("left",(event.clientX+16)+"px").style("top",(event.clientY-10)+"px");
    }).on("mouseleave", () => tooltip.style("opacity", 0));

    // Philosopher dots
    const dots = PHILOSOPHER_DOTS.filter(d => d.nodeId === node.id);
    dots.forEach(dot => {
      const dx = xScale(dot.year);
      g.append("circle")
        .attr("class", "tl-dot")
        .attr("cx", dx).attr("cy", barY + BAR_H / 2)
        .attr("r", 3.5)
        .attr("fill", color).attr("stroke", "#0c0c0e").attr("stroke-width", 1.5)
        .on("mouseenter", function(event) {
          tooltip.style("opacity", 1)
            .html(`<strong>${dot.name}</strong><br><span style="color:#888;font-size:0.8rem">*${dot.year < 0 ? Math.abs(dot.year)+" v. Chr." : dot.year}</span>`);
        })
        .on("mousemove", function(event) {
          tooltip.style("left",(event.clientX+16)+"px").style("top",(event.clientY-10)+"px");
        })
        .on("mouseleave", () => tooltip.style("opacity", 0));

      // Dot label (only if space above)
      g.append("text")
        .attr("class", "tl-dot-label")
        .attr("x", dx).attr("y", barY - 3)
        .attr("text-anchor", "middle")
        .text(dot.name);
    });
  });
}

function openPanelForNode(d) { showNodePanel(d); }

// Close panel when clicking timeline background
document.getElementById("timeline-wrap").addEventListener("click", e => {
  if (e.target === e.currentTarget || e.target.tagName === "svg") {
    panel.classList.remove("open");
  }
});

// Re-render timeline on resize (reset guard so it re-lays out)
window.addEventListener("resize", () => {
  if (document.getElementById("timeline-wrap").classList.contains("visible")) {
    timelineRendered = false;
    document.getElementById("timeline-svg").innerHTML = "";
    renderTimeline();
  }
});

// ── View Toggle ──
document.getElementById("btn-graph").addEventListener("click", () => {
  document.getElementById("graph-wrap").style.display = "";
  document.getElementById("timeline-wrap").classList.remove("visible");
  document.getElementById("btn-graph").classList.add("active");
  document.getElementById("btn-timeline").classList.remove("active");
  document.getElementById("legend").style.display = "";
});
document.getElementById("btn-timeline").addEventListener("click", () => {
  document.getElementById("graph-wrap").style.display = "none";
  document.getElementById("timeline-wrap").classList.add("visible");
  document.getElementById("btn-timeline").classList.add("active");
  document.getElementById("btn-graph").classList.remove("active");
  document.getElementById("legend").style.display = "none";
  renderTimeline();
});

// ── Quiz Engine ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n)  { return shuffle(arr).slice(0, n); }

function generateQuestions(node) {
  const others = nodes.filter(n => n.id !== node.id && posMap[n.id]);
  const qs = [];

  // Q1: Kernthese – Satz bei ". " nach mind. 20 Zeichen splitten, um Abkürzungen zu überspringen
  const snippet = n => {
    const m = n.core.match(/^.{20,}?[.!?](?=\s|$)/);
    return m ? m[0] : n.core.split('. ')[0] + '.';
  };
  qs.push({
    q: `Welche Aussage beschreibt die Kernthese von <em>${node.label}</em>?`,
    opts: shuffle([
      { text: snippet(node), correct: true },
      ...pick(others, 3).map(n => ({ text: snippet(n), correct: false }))
    ]),
    exp: snippet(node)
  });

  // Q2: Vertreter – Duplikate über Schulen hinweg ausschließen
  const myRep = shuffle(node.reps)[0];
  const myRepSet = new Set(node.reps);
  const distractorReps = [];
  for (const other of shuffle(others)) {
    const rep = shuffle(other.reps.filter(r => !myRepSet.has(r)))[0];
    if (rep && !distractorReps.includes(rep)) distractorReps.push(rep);
    if (distractorReps.length >= 3) break;
  }
  if (distractorReps.length >= 3) {
    qs.push({
      q: `Welche Person gehört zur Schule <em>${node.label}</em>?`,
      opts: shuffle([
        { text: myRep, correct: true },
        ...distractorReps.map(r => ({ text: r, correct: false }))
      ]),
      exp: `${myRep} gehört zur Schule ${node.label}.`
    });
  }

  // Q3: Verbindung – nur ausgehende Kanten, um Fragerichtung eindeutig zu halten
  const outEdges = edges.filter(e => e.s === node.id && posMap[e.t]);
  if (outEdges.length) {
    const e = shuffle(outEdges)[0];
    const target = nodes.find(n => n.id === e.t);
    const verbMap = { influences: "beeinflusst", continues: "setzt fort", criticizes: "kritisiert", synthesizes: "synthetisiert" };
    const wrongs = pick(others.filter(n => n.id !== target.id), 3);
    qs.push({
      q: `Welche Schule wird von <em>${node.label}</em> ${verbMap[e.type]}?`,
      opts: shuffle([
        { text: target.label, correct: true },
        ...wrongs.map(n => ({ text: n.label, correct: false }))
      ]),
      exp: e.label
    });
  }
  return qs;
}

function renderQuiz(node) {
  const qs = generateQuestions(node);
  const section = document.getElementById("quiz-section");
  let qi = 0, score = 0;

  function showQ() {
    if (qi >= qs.length) {
      const pct = Math.round((score / qs.length) * 100);
      const msg = score === qs.length ? "Perfekt!" : score >= Math.ceil(qs.length / 2) ? "Gut gemacht!" : "Nochmal lesen!";
      section.innerHTML = `
        <div class="quiz-score">${score} / ${qs.length} richtig</div>
        <div class="quiz-score-sub">${pct}% · ${msg}</div>
        <button class="quiz-next-btn" id="quiz-retry">Nochmal</button>
      `;
      document.getElementById("quiz-retry").addEventListener("click", () => renderQuiz(node));
      return;
    }
    const q = qs[qi];
    section.innerHTML = `
      <div class="quiz-q-counter">Frage ${qi + 1} / ${qs.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o, i) => `<button class="quiz-opt" data-i="${i}" data-ok="${o.correct}" aria-label="${o.text}">${o.text}</button>`).join("")}
      </div>
    `;
    section.querySelectorAll(".quiz-opt").forEach(btn => {
      btn.addEventListener("click", () => {
        const correct = btn.dataset.ok === "true";
        if (correct) score++;
        section.querySelectorAll(".quiz-opt").forEach(b => {
          b.disabled = true;
          if (b.dataset.ok === "true") {
            b.classList.add("correct");
            b.setAttribute("aria-label", b.textContent + " – richtige Antwort");
          } else if (b === btn) {
            b.classList.add("wrong");
            b.setAttribute("aria-label", b.textContent + " – falsch");
          }
        });
        const fb = document.createElement("div");
        fb.className = "quiz-feedback " + (correct ? "correct" : "wrong");
        fb.textContent = (correct ? "✓ Richtig – " : "✗ Falsch – ") + q.exp;
        const nextBtn = document.createElement("button");
        nextBtn.className = "quiz-next-btn";
        nextBtn.textContent = qi < qs.length - 1 ? "Nächste Frage →" : "Ergebnis";
        nextBtn.addEventListener("click", () => { qi++; showQ(); });
        section.appendChild(fb);
        section.appendChild(nextBtn);
      });
    });
  }
  showQ();
}

// ── Lernpfade ──
let activePath = null;
let activeStep = 0;

const pathBar = document.getElementById("path-bar");
const pathStepper = document.getElementById("path-stepper");
const pathCounter = document.getElementById("path-counter");
const pathPrevBtn = document.getElementById("path-prev-btn");
const pathNextBtn = document.getElementById("path-next-btn");

PATHS.forEach(p => {
  const btn = document.createElement("button");
  btn.className = "path-btn";
  btn.dataset.pathId = p.id;
  btn.title = p.desc;
  btn.textContent = p.title;
  btn.addEventListener("click", () => activePath && activePath.id === p.id ? exitPath() : startPath(p.id));
  pathBar.appendChild(btn);
});

function startPath(pathId) {
  activePath = PATHS.find(p => p.id === pathId);
  activeStep = 0;
  document.querySelectorAll(".path-btn").forEach(b => b.classList.toggle("active", b.dataset.pathId === pathId));
  pathStepper.classList.add("visible");
  goToStep(0);
}

function exitPath() {
  activePath = null;
  document.querySelectorAll(".path-btn").forEach(b => b.classList.remove("active"));
  pathStepper.classList.remove("visible");
  nodeGs.classed("path-member", false).classed("path-current", false).classed("path-dim", false);
  edgePaths.classed("highlighted", false).classed("dimmed", false);
  panel.classList.remove("open");
}

function applyPathHighlight() {
  if (!activePath) return;
  const memberIds = new Set(activePath.steps.map(s => s.id));
  nodeGs
    .classed("path-member",  d => memberIds.has(d.id) && d.id !== activePath.steps[activeStep].id)
    .classed("path-current", d => d.id === activePath.steps[activeStep].id)
    .classed("path-dim",     d => !memberIds.has(d.id));
  edgePaths
    .classed("highlighted", e => memberIds.has(e.s) && memberIds.has(e.t))
    .classed("dimmed",      e => !memberIds.has(e.s) || !memberIds.has(e.t));
}

function goToStep(i) {
  activeStep = i;
  const step = activePath.steps[i];
  const d = nodes.find(n => n.id === step.id);
  applyPathHighlight();
  pathCounter.textContent = `Station ${i + 1} / ${activePath.steps.length}: ${d.label}`;
  pathPrevBtn.disabled = i === 0;
  pathNextBtn.disabled = i === activePath.steps.length - 1;
  showNodePanel(d, step.transition);
}

pathPrevBtn.addEventListener("click", () => { if (activeStep > 0) goToStep(activeStep - 1); });
pathNextBtn.addEventListener("click", () => { if (activeStep < activePath.steps.length - 1) goToStep(activeStep + 1); });
document.getElementById("path-exit-btn").addEventListener("click", exitPath);

// ── Legend toggle (mobile) ──
document.getElementById("legend-toggle").addEventListener("click", function() {
  const legend = document.getElementById("legend");
  const open = legend.classList.toggle("open");
  this.setAttribute("aria-expanded", open);
  this.textContent = open ? "Legende ▴" : "Legende ▾";
});
</script>
